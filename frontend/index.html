<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HKMU Campus Platform</title>
    <meta name="theme-color" content="#0066CC">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="HKMU Campus">
    <meta name="ga4-measurement-id" content="G-2TT86K3S1F">
    <meta name="mixpanel-token" content="">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">
    <!-- Single bundled stylesheet (Tailwind utilities + the eight custom
         component CSS files), built at image-build time by frontend/build-css.sh.
         Replaces the cdn.tailwindcss.com Play CDN — a render-blocking JIT
         compiler downloaded on every page load — plus the eight separate
         <link> requests. System font stack via Tailwind preflight (Inter was
         loaded before but never referenced by any font-family rule). -->
    <link rel="stylesheet" href="css/app.min.css">
    <!-- Lucide icons: pinned + deferred in <head> so it loads in parallel with
         HTML parsing and is ready before the deferred app.js module runs
         (nav.js/planner.js call window.lucide.createIcons() at DOMContentLoaded). -->
    <script defer src="https://unpkg.com/lucide@0.468.0"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <a href="#app-content" class="skip-link">Skip to main content</a>
    <nav id="app-nav" class="sticky top-0 z-50 shadow-sm" aria-label="Main navigation">
        <div class="px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button id="sidebar-toggle" class="hamburger-btn md:hidden" aria-label="Toggle sidebar menu">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <a href="https://www.hkmu.edu.hk/" target="_blank" class="brand-logo-link">
                    <img src="icons/HKMU.png" alt="HKMU" class="brand-logo">
                </a>
                <a href="#/" class="text-xl font-bold">HKMU Campus</a>
            </div>
            <div id="nav-utilities" class="flex items-center gap-2"></div>
        </div>
    </nav>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="app-layout">
        <aside id="app-sidebar" class="app-sidebar" aria-label="Sidebar navigation">
            <nav>
                <ul id="sidebar-main-nav"></ul>
            </nav>
            <div id="sidebar-community-section" class="sidebar-subsection hidden">
                <ul id="sidebar-community-cats"></ul>
            </div>
        </aside>
        <main id="app-content" class="app-main"></main>
    </div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/app.js" type="module"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
      // PWA install prompt
      window._deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window._deferredInstallPrompt = e;
      });
      // Network status indicator
      window.addEventListener('offline', () => {
        document.body.setAttribute('data-offline', 'true');
      });
      window.addEventListener('online', () => {
        document.body.removeAttribute('data-offline');
      });
    </script>
</body>
</html>
