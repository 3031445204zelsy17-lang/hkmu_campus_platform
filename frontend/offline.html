<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Offline — HKMU Campus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #F5F7FA;
      color: #1A1A2E;
    }
    .offline-card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 400px;
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #6B7280;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #0066CC, #2E7D52);
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .retry-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">&#128268;</div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection and try again.</p>
    <a href="/" class="retry-btn">Retry</a>
  </div>
</body>
</html>
