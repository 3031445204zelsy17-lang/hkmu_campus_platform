name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SECRET_KEY: ci-secret-key
      DB_POOL_MIN: 1
      DB_POOL_MAX: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Verify backend syntax
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/config.py
          python -m py_compile backend/app/database.py
          python -m py_compile backend/app/models.py
          for f in backend/app/routers/*.py; do python -m py_compile "$f"; done
          for f in backend/app/services/*.py; do python -m py_compile "$f"; done

      - name: Seed and verify DB
        run: |
          cp .env.example .env
          python scripts/seed_courses.py

      - name: Start server health check
        run: |
          python -m uvicorn backend.app.main:app --port 8000 &
          sleep 5
          curl -f http://localhost:8000/api/health
          curl -f http://localhost:8000/manifest.json > /dev/null
          kill %1

      - name: Verify Docker build
        run: |
          docker build -t hkmu-campus .
          docker run -d --name test-container --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e SECRET_KEY="$SECRET_KEY" \
            -e DB_POOL_MIN="$DB_POOL_MIN" \
            -e DB_POOL_MAX="$DB_POOL_MAX" \
            hkmu-campus
          sleep 5
          curl -f http://localhost:8000/api/health
          docker stop test-container
