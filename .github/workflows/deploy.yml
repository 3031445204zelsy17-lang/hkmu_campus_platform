name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SECRET_KEY: ci-secret-key
      DB_POOL_MIN: 1
      DB_POOL_MAX: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Verify backend syntax
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/config.py
          python -m py_compile backend/app/database.py
          python -m py_compile backend/app/models.py
          for f in backend/app/routers/*.py; do python -m py_compile "$f"; done
          for f in backend/app/services/*.py; do python -m py_compile "$f"; done

      # Phase 3a — build the Tailwind CSS bundle in CI so a broken build
      # (bad config, missing custom CSS, missing class coverage) fails the
      # PR here instead of at `docker build` or in prod. The Dockerfile's node
      # stage re-runs the same build; this step gives faster, isolated feedback.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Tailwind CSS bundle
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          sh build-css.sh
          test -s css/app.min.css

      - name: Seed and verify DB
        run: |
          cp .env.example .env
          python scripts/seed_courses.py

      # Security roadmap G — lock the A/B/E fixes as automated regressions.
      # Dev deps stay out of the prod image (Dockerfile only installs
      # backend/requirements.txt). pytest runs against the postgres service
      # above; any failure fails this job and blocks the PR/push.
      - name: Run security regression tests (pytest)
        run: |
          pip install -r backend/requirements-dev.txt
          pytest backend/tests -q

      - name: Start server health check
        run: |
          python -m uvicorn backend.app.main:app --port 8000 &
          sleep 5
          curl -f http://localhost:8000/api/health
          curl -f http://localhost:8000/manifest.json > /dev/null
          kill %1

      - name: Verify Docker build
        run: |
          docker build -t hkmu-campus .
          docker run -d --name test-container --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e SECRET_KEY="$SECRET_KEY" \
            -e DB_POOL_MIN="$DB_POOL_MIN" \
            -e DB_POOL_MAX="$DB_POOL_MAX" \
            hkmu-campus
          sleep 5
          curl -f http://localhost:8000/api/health
          docker stop test-container
