name: DB Backup

# Daily full backup of the Supabase database. Supabase free tier has NO
# built-in backup, so this is the only safety net for user data.
# Dump is stored as a GitHub Actions artifact (14-day rolling retention).

on:
  schedule:
    - cron: "17 18 * * *"   # UTC 18:17 daily (~02:17 Beijing, low-traffic)
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump Supabase database
        env:
          # Direct connection (db.<ref>.supabase.com:5432) — Supabase's
          # recommended mode for pg_dump (session-level, not pooler).
          # Set in repo Settings → Secrets and variables → Actions as
          # SUPABASE_DB_URL_BACKUP =
          # postgresql://postgres.sizuuojtadkntjjibxuv:<DB_PASSWORD>@db.sizuuojtadkntjjibxuv.supabase.com:5432/postgres
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL_BACKUP }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::SUPABASE_DB_URL_BACKUP secret not set — skipping. Add it in repo Settings → Secrets."
            exit 0
          fi
          STAMP=$(date -u +%Y%m%d)
          echo "Backing up to backup-${STAMP}.dump / .sql"
          pg_dump "$DATABASE_URL" --no-owner --no-acl --format=custom -f "backup-${STAMP}.dump"
          pg_dump "$DATABASE_URL" --no-owner --no-acl > "backup-${STAMP}.sql"
          ls -lh backup-${STAMP}.*

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-*
          retention-days: 14
