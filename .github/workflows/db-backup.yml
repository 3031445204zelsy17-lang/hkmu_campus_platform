name: DB Backup

# Daily full backup of the Supabase database. Supabase free tier has NO
# built-in backup, so this is the only safety net for user data.
# Dump is stored as a GitHub Actions artifact (14-day rolling retention).

on:
  schedule:
    - cron: "17 18 * * *"   # UTC 18:17 daily (~02:17 Beijing, low-traffic)
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client 17 (match Supabase PG 17)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Dump Supabase database
        env:
          # Use the Supabase POOLER (IPv4, reachable from GitHub Actions).
          # Direct host db.<ref>.supabase.co is IPv6-only and unreachable here.
          # Set in repo Settings → Secrets as SUPABASE_DB_URL_BACKUP
          # (legacy name "MUCP" also accepted as fallback):
          # postgresql://postgres.sizuuojtadkntjjibxuv:<DB_PASSWORD>@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
          PRIMARY_URL: ${{ secrets.SUPABASE_DB_URL_BACKUP }}
          FALLBACK_URL: ${{ secrets.MUCP }}
        run: |
          DATABASE_URL="${PRIMARY_URL:-$FALLBACK_URL}"
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::No DB URL secret set (SUPABASE_DB_URL_BACKUP or MUCP) — skipping."
            exit 0
          fi
          STAMP=$(date -u +%Y%m%d)
          echo "Backing up to backup-${STAMP}.dump / .sql"
          pg_dump "$DATABASE_URL" --no-owner --no-acl --format=custom -f "backup-${STAMP}.dump"
          pg_dump "$DATABASE_URL" --no-owner --no-acl > "backup-${STAMP}.sql"
          ls -lh backup-${STAMP}.*

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-*
          retention-days: 14
